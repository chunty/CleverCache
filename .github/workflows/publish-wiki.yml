name: Publish Wiki

on:
  push:
    branches: [main]
    paths: ['wiki/**']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Push wiki to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repo About
        run: |
          gh repo edit chunty/CleverCache \
            --description "Automatic cache invalidation for .NET — tracks EF Core changes and evicts cache entries automatically. Supports memory, distributed, Redis, and MediatR." \
            --homepage "https://github.com/chunty/CleverCache/wiki" \
            --add-topic dotnet \
            --add-topic caching \
            --add-topic efcore \
            --add-topic csharp \
            --add-topic nuget \
            --add-topic mediatr \
            --add-topic redis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
